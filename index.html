<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Занятия</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111118;
      --blob-a:   #1f1f2e;
      --blob-b:   #16161f;
      --blob-c:   #1a1a28;
      --accent:   #b8922a;
      --accent2:  #6b5ecd;
      --text:     rgba(255,255,255,0.87);
      --text-dim: rgba(255,255,255,0.45);
      --card-bg:  rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --tab-ind:  rgba(255,255,255,0.12);
    }
    :root.theme-kep {
      --bg:      #110d00;
      --blob-a:  #3a2800;
      --blob-b:  #241800;
      --blob-c:  #2e2000;
      --accent:  #d4a43a;
    }
    :root.theme-olmat {
      --bg:      #08080f;
      --blob-a:  #141430;
      --blob-b:  #0a0a22;
      --blob-c:  #10102a;
      --accent:  #7c6ee0;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }
  </style>
</head>
<body>
  <script>
    // будет заполняться в следующих задачах
  </script>
</body>
</html>
