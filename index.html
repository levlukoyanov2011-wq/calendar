<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Занятия</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111118;
      --blob-a:   #1f1f2e;
      --blob-b:   #16161f;
      --blob-c:   #1a1a28;
      --accent:   #b8922a;
      --accent2:  #6b5ecd;
      --text:     rgba(255,255,255,0.87);
      --text-dim: rgba(255,255,255,0.45);
      --card-bg:  rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --tab-ind:  rgba(255,255,255,0.12);
    }
    :root.theme-kep {
      --bg:      #110d00;
      --blob-a:  #3a2800;
      --blob-b:  #241800;
      --blob-c:  #2e2000;
      --accent:  #d4a43a;
    }
    :root.theme-olmat {
      --bg:      #08080f;
      --blob-a:  #141430;
      --blob-b:  #0a0a22;
      --blob-c:  #10102a;
      --accent:  #7c6ee0;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }

    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
      transition: background 0.6s ease;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-a {
      width: 55vw; height: 55vw;
      background: var(--blob-a);
      top: -15%; left: -10%;
      animation-duration: 22s;
    }
    .blob-b {
      width: 45vw; height: 45vw;
      background: var(--blob-b);
      bottom: -10%; right: -5%;
      animation-duration: 18s;
      animation-delay: -8s;
    }
    .blob-c {
      width: 35vw; height: 35vw;
      background: var(--blob-c);
      top: 40%; left: 35%;
      animation-duration: 25s;
      animation-delay: -12s;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(4%,3%) scale(1.05); }
      66%  { transform: translate(-3%,5%) scale(0.97); }
      100% { transform: translate(2%,-4%) scale(1.03); }
    }
    #noise {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
    #app { position: relative; z-index: 2; }
  </style>
</head>
<body>
  <div id="bg">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <svg style="position:fixed;width:0;height:0"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter></svg>
  <div id="noise"></div>
  <script>
    // будет заполняться в следующих задачах
  </script>
</body>
</html>
