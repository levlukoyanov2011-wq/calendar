<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Занятия</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Golos+Text:wght@400;500;600&family=Raleway:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a28;
      --blob-a:   #2e2e4a;
      --blob-b:   #222238;
      --blob-c:   #26263c;
      --accent:   #b8922a;
      --accent2:  #6b5ecd;
      --text:     rgba(255,255,255,0.87);
      --text-dim: rgba(255,255,255,0.45);
      --card-bg:  rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.1);
      --tab-ind:  rgba(255,255,255,0.14);
    }
    :root.theme-kep {
      --bg:      #1c1500;
      --blob-a:  #4a3510;
      --blob-b:  #30200a;
      --blob-c:  #3c2c0c;
      --accent:  #d4a43a;
    }
    :root.theme-olmat {
      --bg:      #0c0c26;
      --blob-a:  #1e1e80;
      --blob-b:  #16166a;
      --blob-c:  #1a1a70;
      --accent:  #9080f0;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }

    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
      transition: background 0.6s ease;
      overflow: hidden;
    }
    #bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 40%, rgba(0,0,0,0.6) 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 40%, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    #bg::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 0 0 140px rgba(255,255,255,0.02),
                  0 0 0 280px rgba(255,255,255,0.015),
                  0 0 0 420px rgba(255,255,255,0.01);
      pointer-events: none;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    :root.theme-kep #bg::after {
      transform: translate(-62%, -42%);
    }
    :root.theme-olmat #bg::after {
      transform: translate(-38%, -60%);
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-a {
      width: 55vw; height: 55vw;
      background: var(--blob-a);
      top: -15%; left: -10%;
      animation-duration: 22s;
    }
    .blob-b {
      width: 45vw; height: 45vw;
      background: var(--blob-b);
      bottom: -10%; right: -5%;
      animation-duration: 18s;
      animation-delay: -8s;
    }
    .blob-c {
      width: 35vw; height: 35vw;
      background: var(--blob-c);
      top: 40%; left: 35%;
      animation-duration: 25s;
      animation-delay: -12s;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(4%,3%) scale(1.05); }
      66%  { transform: translate(-3%,5%) scale(0.97); }
      100% { transform: translate(2%,-4%) scale(1.03); }
    }
    #noise {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
    #app {
      position: fixed; inset: 0; z-index: 2;
      overflow-y: auto;
      overscroll-behavior: none;
      scrollbar-gutter: stable;
    }

    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 20px 0;
    }
    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .week-count {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .tabs-wrap { overflow: hidden; }
    .tabs {
      display: inline-flex;
      position: relative;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
    }
    .tab {
      position: relative; z-index: 1;
      padding: 8px 20px;
      border: none; background: none;
      color: var(--text-dim);
      font-family: 'Golos Text', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border-radius: 9px;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--text); }
    .tab-indicator {
      position: absolute;
      top: 4px; height: calc(100% - 8px);
      background: var(--tab-ind);
      border-radius: 9px;
      transition: left 0.25s cubic-bezier(.4,0,.2,1), width 0.25s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #fab {
      position: fixed;
      bottom: 28px; right: 28px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #000;
      font-size: 24px;
      font-weight: 300;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.15s, background 0.6s ease;
      z-index: 100;
      line-height: 1;
    }
    #fab:hover { transform: scale(1.08); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s, opacity 0.2s, transform 0.15s;
      animation: fadeUp 0.4s ease both;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .card.done { opacity: 0.35; }
    .card-top { display: flex; align-items: center; gap: 10px; }
    .badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge-kep   { background: rgba(184,146,42,0.2);  color: #d4a43a; }
    .badge-olmat { background: rgba(107,94,205,0.2);  color: #9b8ef0; }
    .card-org  { font-size: 12px; color: var(--text-dim); margin-left: auto; }
    .card-meta { font-size: 13px; color: var(--text-dim); }
    .card-topic {
      font-size: 15px; color: var(--text);
      font-weight: 500;
    }
    .card.done .card-topic { text-decoration: line-through; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes flyToArchive {
      0%   { opacity: 1; transform: translateX(0) scale(1); }
      25%  { transform: translateX(-6px) scale(0.99); }
      100% { opacity: 0; transform: translateX(48px) scale(0.93); }
    }
    @keyframes flyFromArchive {
      0%   { opacity: 0; transform: translateX(48px) scale(0.93); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    .card.flying-out {
      animation: flyToArchive 0.38s cubic-bezier(0.4, 0, 0.7, 1) both;
      pointer-events: none;
    }
    .card.flying-in {
      animation: flyFromArchive 0.35s cubic-bezier(0.2, 0, 0, 1) both;
      pointer-events: none;
    }
    .empty-state {
      text-align: center;
      padding: 64px 0;
      color: var(--text-dim);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      animation: fadeUp 0.4s ease both;
    }
    .empty-state p { font-size: 15px; line-height: 1.6; }
    .empty-state p strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .empty-btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .empty-btn:hover { background: rgba(255,255,255,0.11); }

    dialog {
      position: fixed;
      inset: 0; margin: auto;
      width: min(480px, calc(100vw - 32px));
      max-height: calc(100vh - 40px);
      background: #1a1a26;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 0;
      color: var(--text);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      overflow: hidden;
      animation: modalIn 0.2s ease both;
    }
    dialog::backdrop {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .modal-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-dim); font-size: 16px;
      cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body {
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto; max-height: calc(100vh - 220px);
    }
    .modal-body label { display: flex; flex-direction: column; gap: 6px; }
    .modal-body label span { font-size: 12px; color: var(--text-dim); letter-spacing: 0.04em; }
    .modal-body input,
    .modal-body select,
    .modal-body textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .modal-body input:focus,
    .modal-body select:focus,
    .modal-body textarea:focus { border-color: rgba(255,255,255,0.25); }
    .modal-body textarea { resize: vertical; }
    .modal-body select option { background: #1a1a26; }
    .field-row { display: flex; gap: 12px; }
    .field-row label { flex: 1; }
    .modal-footer {
      padding: 16px 24px;
      display: flex; justify-content: flex-end; gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .btn-save {
      padding: 10px 24px;
      background: var(--accent);
      border: none; border-radius: 10px;
      color: #000; font-family: 'Golos Text', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s, background 0.6s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-delete {
      padding: 10px 16px;
      background: none;
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 10px;
      color: rgba(255,100,100,0.7);
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      cursor: pointer; margin-right: auto;
      transition: background 0.15s;
      display: none;
    }
    .btn-delete:hover { background: rgba(255,80,80,0.1); }

    .check-btn {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.22);
      background: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      color: transparent;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .check-btn:hover { border-color: rgba(255,255,255,0.45); }
    .check-btn.checked {
      background: var(--accent); border-color: var(--accent);
      color: #000;
      transition: background 0.6s, border-color 0.6s, color 0.2s;
    }
    .archive-wrap { margin-top: 4px; }
    .archive-toggle {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      color: var(--text-dim);
      font-family: 'Golos Text', sans-serif; font-size: 13px;
      cursor: pointer; transition: background 0.2s;
    }
    .archive-toggle:hover { background: rgba(255,255,255,0.06); }
    .archive-count {
      background: rgba(255,255,255,0.08); border-radius: 20px;
      padding: 1px 8px; font-size: 11px;
    }
    .archive-arrow {
      margin-left: auto; font-size: 16px; line-height: 1;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      display: inline-block;
    }
    .archive-arrow.open { transform: rotate(90deg); }
    .archive-list {
      margin-top: 8px; display: flex; flex-direction: column; gap: 8px;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }
    #cal-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 5px 12px;
      color: var(--text-dim); font-family: 'Golos Text', sans-serif;
      font-size: 12px; letter-spacing: 0.04em;
      cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.6s;
      white-space: nowrap;
    }
    #cal-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    #cal-btn.active { color: var(--text); background: rgba(255,255,255,0.09);
                      border-color: rgba(255,255,255,0.2); }

    .cal-wrap {
      max-width: 680px; margin: 0 auto; padding: 0 20px;
      overflow: visible;
    }
    .cal-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 16px 16px 12px;
      margin-bottom: 16px;
      animation: fadeUp 0.25s ease both;
      overflow: visible;
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 2px 8px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .cal-nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }
    .cal-title {
      font-family: 'Raleway', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text);
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
      overflow: visible;
    }
    .cal-weekday {
      text-align: center; font-size: 10px; color: var(--text-dim);
      letter-spacing: 0.06em; padding: 0 0 6px; text-transform: uppercase;
    }
    .cal-day {
      position: relative; text-align: center;
      padding: 6px 2px 5px; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      min-height: 40px; color: var(--text-dim); font-size: 13px;
      transition: background 0.15s;
      overflow: visible;
    }
    .cal-day.other-month { opacity: 0.25; }
    .cal-day.has-lessons { cursor: pointer; }
    .cal-day.has-lessons:hover { background: rgba(255,255,255,0.07); }
    .cal-day.today .cal-day-num {
      background: var(--accent); color: #000; border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; transition: background 0.6s;
    }
    .cal-dots { display: flex; gap: 3px; justify-content: center; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot-kep   { background: #d4a43a; }
    .cal-dot-olmat { background: #9080f0; }
    .cal-popup {
      position: absolute;
      top: calc(100% + 8px); left: 50%;
      transform: translateX(-50%) scale(0.88) translateY(6px);
      transform-origin: top center;
      min-width: 180px; max-width: 220px;
      background: #1e1e2e; border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px; padding: 10px 12px;
      z-index: 200; text-align: left; pointer-events: none;
      box-shadow: 0 10px 32px rgba(0,0,0,0.5);
      visibility: hidden; opacity: 0;
      transition: opacity 0.15s ease, transform 0.18s ease, visibility 0s linear 0.15s;
    }
    @media (hover: hover) and (pointer: fine) {
      .cal-day.has-lessons:hover .cal-popup {
        visibility: visible; opacity: 1;
        transform: translateX(-50%) scale(1) translateY(0);
        transition: opacity 0.22s ease 0.3s,
                    transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1) 0.3s,
                    visibility 0s linear 0.3s;
      }
    }
    .cal-day.has-lessons.tapped .cal-popup {
      visibility: visible; opacity: 1;
      transform: translateX(-50%) scale(1) translateY(0);
      transition: opacity 0.2s ease, transform 0.28s cubic-bezier(0.34, 1.4, 0.64, 1), visibility 0s;
    }
    .cal-popup-date {
      font-size: 11px; color: var(--text-dim); margin-bottom: 7px;
      letter-spacing: 0.04em;
    }
    .cal-popup-item {
      display: flex; align-items: flex-start; gap: 7px;
      margin-bottom: 5px; font-size: 12px; line-height: 1.35; color: var(--text);
    }
    .cal-popup-item:last-child { margin-bottom: 0; }
    .cal-popup-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    .tg-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 16px;
      background: rgba(41,182,246,0.1);
      border: 1px solid rgba(41,182,246,0.2);
      border-radius: 12px;
      color: #61c8f5; font-family: 'Golos Text', sans-serif;
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .tg-btn:hover { background: rgba(41,182,246,0.18); border-color: rgba(41,182,246,0.35); }
  </style>
</head>
<body>
  <div id="bg">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <svg style="position:fixed;width:0;height:0"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter></svg>
  <div id="noise"></div>
  <div id="app">
    <header>
      <div class="header-top">
        <h1>Занятия</h1>
        <div class="header-right">
          <span id="week-count" class="week-count"></span>
          <button id="cal-btn" onclick="toggleCalendar()">Календарь</button>
        </div>
      </div>
      <div class="tabs-wrap">
        <div class="tabs">
          <button class="tab active" data-tab="all">Все</button>
          <button class="tab" data-tab="kep">КЭП</button>
          <button class="tab" data-tab="olmat">Олмат</button>
          <div class="tab-indicator"></div>
        </div>
      </div>
    </header>
    <div class="cal-wrap"><div id="cal-panel" style="display:none"></div></div>
    <main id="lessons-list"></main>
    <button id="fab" onclick="openModal()">+</button>
    <dialog id="modal">
      <form id="lesson-form" onsubmit="saveLesson(event)">
        <div class="modal-header">
          <h2 id="modal-title">Новое занятие</h2>
          <button type="button" class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <label>
            <span>Организация</span>
            <select name="type" required>
              <option value="kep">КЭП</option>
              <option value="olmat">Олмат</option>
            </select>
          </label>

          <div class="field-row">
            <label>
              <span>Дата</span>
              <input name="date" type="date" required>
            </label>
            <label>
              <span>Время</span>
              <input name="time" type="time">
            </label>
          </div>
          <label>
            <span>Тема</span>
            <textarea name="topic" rows="3" placeholder="Тема занятия" required maxlength="200"></textarea>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" id="delete-btn" class="btn-delete" onclick="confirmDelete()">Удалить</button>
          <button type="submit" class="btn-save">Сохранить</button>
        </div>
      </form>
    </dialog>
  </div>
  <script>
    const STORAGE_KEY = 'tracker-lessons';

    function loadLessons() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveLessons(lessons) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lessons));
    }

    function addLesson(data) {
      const lessons = loadLessons();
      lessons.push({ id: Date.now(), ...data, done: false });
      saveLessons(lessons);
    }

    function updateLesson(id, patch) {
      const lessons = loadLessons();
      const i = lessons.findIndex(l => l.id === id);
      if (i !== -1) { lessons[i] = { ...lessons[i], ...patch }; saveLessons(lessons); }
    }

    function deleteLesson(id) {
      saveLessons(loadLessons().filter(l => l.id !== id));
    }

    function toggleDone(id) {
      const lessons = loadLessons();
      const l = lessons.find(l => l.id === id);
      if (l) { l.done = !l.done; saveLessons(lessons); }
    }

    function seedIfEmpty() {
      if (loadLessons().length > 0) return;
      const demos = [
        { id: 1, type: 'olmat', org: 'Центр «Сириус»',    date: '2026-06-05', time: '18:00', topic: 'Разбор задач ВсОШ по математике',  done: false },
        { id: 2, type: 'olmat', org: 'МФТИ',               date: '2026-06-10', time: '17:30', topic: 'Теория чисел: делимость и НОД',    done: false },
        { id: 3, type: 'olmat', org: 'Олимпиадная школа',  date: '2026-06-15', time: '16:00', topic: 'Комбинаторика: принцип Дирихле',   done: true  },
        { id: 4, type: 'olmat', org: 'Онлайн-курс',        date: '2026-06-20', time: '19:00', topic: 'Алгебра: многочлены и корни',      done: false },
      ];
      saveLessons(demos);
    }

    let currentTab = 'all';
    let archiveOpen = false;

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    }

    function dateCmp(a, b) {
      return new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00'));
    }

    function cardHTML(l, i) {
      return `<div class="card ${l.done ? 'done' : ''}"
           style="animation-delay:${i * 60}ms"
           onclick="handleCardClick(event, ${l.id})">
        <div class="card-top">
          <button class="check-btn ${l.done ? 'checked' : ''}"
                  onclick="event.stopPropagation(); archiveCard(event, ${l.id}, ${l.done});">✓</button>
          <span class="badge badge-${l.type}">${l.type === 'kep' ? 'КЭП' : 'Олмат'}</span>
        </div>
        <div class="card-meta">${formatDate(l.date)}${l.time ? ' · ' + l.time : ''}</div>
        <div class="card-topic">${escHtml(l.topic)}</div>
      </div>`;
    }

    function renderLessons() {
      const list = document.getElementById('lessons-list');
      let all = loadLessons();

      if (currentTab === 'kep')   all = all.filter(l => l.type === 'kep');
      if (currentTab === 'olmat') all = all.filter(l => l.type === 'olmat');

      const active = all.filter(l => !l.done).sort(dateCmp);
      const done   = all.filter(l =>  l.done).sort(dateCmp);

      let html = currentTab === 'olmat' ? `<a class="tg-btn" href="https://t.me/+4kq100fFNVg3NTI6" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.48 14.226l-2.95-.924c-.64-.203-.654-.64.136-.948l11.527-4.443c.537-.194 1.006.131.369.337z"/></svg>
        Канал Олмат
      </a>` : '';

      if (active.length === 0) {
        html += `<div class="empty-state">
          <p><strong>Пока занятий нет</strong>Добавь первое — и оно появится здесь</p>
          <button class="empty-btn" onclick="openModal()">Добавить занятие</button>
        </div>`;
      } else {
        html += active.map((l, i) => cardHTML(l, i)).join('');
      }

      if (done.length > 0) {
        html += `<div class="archive-wrap">
          <button class="archive-toggle" onclick="archiveOpen=!archiveOpen; renderArchive();">
            <span>Архив</span>
            <span class="archive-count">${done.length}</span>
            <span class="archive-arrow">›</span>
          </button>
          <div id="archive-list" class="archive-list"></div>
        </div>`;
      }

      list.innerHTML = html;
      updateWeekCount();
      renderArchive();
    }

    function renderArchive() {
      const el = document.getElementById('archive-list');
      if (!el) return;
      const arrow = document.querySelector('.archive-arrow');
      if (arrow) arrow.classList.toggle('open', archiveOpen);
      if (!archiveOpen) { el.innerHTML = ''; return; }
      let all = loadLessons();
      if (currentTab === 'kep')   all = all.filter(l => l.type === 'kep');
      if (currentTab === 'olmat') all = all.filter(l => l.type === 'olmat');
      const done = all.filter(l => l.done).sort(dateCmp);
      el.innerHTML = done.map((l, i) => cardHTML(l, i)).join('');
    }

    function archiveCard(e, id, isDone) {
      const card = e.target.closest('.card');
      if (!card) { toggleDone(id); renderLessons(); return; }
      card.classList.add(isDone ? 'flying-in' : 'flying-out');
      setTimeout(() => { toggleDone(id); renderLessons(); }, 360);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function handleCardClick(e, id) {
      openModal(id);
    }

    function updateWeekCount() {
      const now = new Date();
      const day = now.getDay() || 7;
      const mon = new Date(now); mon.setDate(now.getDate() - day + 1); mon.setHours(0,0,0,0);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
      let lessons = loadLessons();
      if (currentTab === 'kep')   lessons = lessons.filter(l => l.type === 'kep');
      if (currentTab === 'olmat') lessons = lessons.filter(l => l.type === 'olmat');
      const count = lessons.filter(l => {
        const d = new Date(l.date + 'T00:00:00');
        return d >= mon && d <= sun;
      }).length;
      const el = document.getElementById('week-count');
      if (el) el.textContent = count > 0 ? `${count} на этой неделе` : '';
    }

    let calVisible = false;
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    function toggleCalendar() {
      calVisible = !calVisible;
      const btn   = document.getElementById('cal-btn');
      const panel = document.getElementById('cal-panel');
      btn.classList.toggle('active', calVisible);
      if (calVisible) {
        panel.style.display = 'block';
        renderCalendar();
      } else {
        panel.style.display = 'none';
      }
    }

    function renderCalendar() {
      const panel = document.getElementById('cal-panel');
      if (!panel || !calVisible) return;

      const lessons = loadLessons();
      const lessonMap = {};
      lessons.forEach(l => {
        if (!lessonMap[l.date]) lessonMap[l.date] = [];
        lessonMap[l.date].push(l);
      });

      const today    = new Date();
      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay  = new Date(calYear, calMonth + 1, 0);
      let startDow = firstDay.getDay();
      startDow = startDow === 0 ? 6 : startDow - 1;

      const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                      'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
      const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

      let html = `<div class="cal-panel">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();">‹</button>
          <span class="cal-title">${MONTHS[calMonth]} ${calYear}</span>
          <button class="cal-nav-btn" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();">›</button>
        </div>
        <div class="cal-grid">`;

      DAYS.forEach(d => { html += `<div class="cal-weekday">${d}</div>`; });

      for (let i = 0; i < startDow; i++) html += `<div class="cal-day"></div>`;

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateStr    = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayLessons = lessonMap[dateStr] || [];
        const isToday    = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;

        const hasKep   = dayLessons.some(l => l.type==='kep');
        const hasOlmat = dayLessons.some(l => l.type==='olmat');

        let dots = '';
        if (hasKep)   dots += `<span class="cal-dot cal-dot-kep"></span>`;
        if (hasOlmat) dots += `<span class="cal-dot cal-dot-olmat"></span>`;

        let popup = '';
        if (dayLessons.length > 0) {
          popup = `<div class="cal-popup">
            <div class="cal-popup-date">${formatDate(dateStr)}</div>
            ${dayLessons.map(l => `<div class="cal-popup-item">
              <span class="cal-popup-dot" style="background:${l.type==='kep'?'#d4a43a':'#9080f0'}"></span>
              <span>${l.time ? l.time+' · ' : ''}${escHtml(l.topic)}</span>
            </div>`).join('')}
          </div>`;
        }

        html += `<div class="cal-day ${dayLessons.length>0?'has-lessons':''} ${isToday?'today':''}"
          ${dayLessons.length>0?'onclick="calDayTap(event,this)"':''}>
          <span class="cal-day-num">${d}</span>
          ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
          ${popup}
        </div>`;
      }

      html += `</div></div>`;
      panel.innerHTML = html;
    }

    function calDayTap(e, el) {
      e.stopPropagation();
      const open = el.classList.contains('tapped');
      document.querySelectorAll('.cal-day.tapped').forEach(d => d.classList.remove('tapped'));
      if (!open) el.classList.add('tapped');
    }
    document.addEventListener('click', () => {
      document.querySelectorAll('.cal-day.tapped').forEach(d => d.classList.remove('tapped'));
    });

    const THEMES = { all: '', kep: 'theme-kep', olmat: 'theme-olmat' };

    function switchTab(tab) {
      currentTab = tab;

      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });

      const root = document.documentElement;
      root.className = THEMES[tab] || '';

      moveIndicator(document.querySelector(`.tab[data-tab="${tab}"]`));
      renderLessons();
    }

    function moveIndicator(activeTab) {
      const ind = document.querySelector('.tab-indicator');
      const wrap = document.querySelector('.tabs');
      if (!ind || !activeTab || !wrap) return;
      const wrapRect = wrap.getBoundingClientRect();
      const tabRect  = activeTab.getBoundingClientRect();
      ind.style.left  = (tabRect.left - wrapRect.left) + 'px';
      ind.style.width = tabRect.width + 'px';
    }

    let editingId = null;

    function openModal(id) {
      editingId = id || null;
      const modal = document.getElementById('modal');
      const form  = document.getElementById('lesson-form');
      const title = document.getElementById('modal-title');
      const delBtn = document.getElementById('delete-btn');

      form.reset();

      if (id) {
        const l = loadLessons().find(l => l.id === id);
        if (!l) return;
        title.textContent = 'Редактировать';
        form.type.value  = l.type;
        form.date.value  = l.date;
        form.time.value  = l.time || '';
        form.topic.value = l.topic;
        delBtn.style.display = 'block';
      } else {
        title.textContent = 'Новое занятие';
        delBtn.style.display = 'none';
      }

      modal.showModal();
    }

    function closeModal() {
      document.getElementById('modal').close();
      editingId = null;
    }

    function saveLesson(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        type:  form.type.value,

        date:  form.date.value,
        time:  form.time.value,
        topic: form.topic.value.trim(),
      };
      if (editingId) { updateLesson(editingId, data); }
      else { addLesson(data); }
      closeModal();
      renderLessons();
    }

    function confirmDelete() {
      if (!editingId) return;
      if (confirm('Удалить занятие?')) {
        deleteLesson(editingId);
        closeModal();
        renderLessons();
      }
    }

    document.getElementById('modal')?.addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('DOMContentLoaded', () => {
      seedIfEmpty();

      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => switchTab(t.dataset.tab));
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.getElementById('modal').open) closeModal();
      });

      requestAnimationFrame(() => {
        moveIndicator(document.querySelector('.tab.active'));
      });

      renderLessons();
    });

  </script>
</body>
</html>
